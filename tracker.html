<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Tracker | Lorenzo von Neumann-Cosel</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--kodak:#F5C800;--kodak-deep:#E0B200;--black:#0D0D0D;--cream:#F5F0E8;--warm-grey:#C8C2B4;--dark-brown:#2A1F0A;--terracotta:#C4522A;--s-applied:#F5C800;--s-interview:#4A90D9;--s-offer:#27AE60;--s-rejected:#C4522A;--s-waiting:#888;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--cream);font-family:"Playfair Display",serif;min-height:100vh;}
nav{background:var(--black);border-bottom:3px solid var(--kodak);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:58px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.15em;color:var(--kodak);text-decoration:none;}
.nav-back{font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--warm-grey);text-decoration:none;border:1.5px solid #333;padding:.4rem .9rem;transition:all .2s;}
.nav-back:hover{border-color:var(--kodak);color:var(--kodak);}
.nav-title{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:.2em;color:var(--warm-grey);}
/* PIN */
.pin-screen{min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;}
.pin-box{background:#111;border:2px solid var(--terracotta);padding:3rem;width:360px;text-align:center;}
.pin-icon{font-family:"Abril Fatface",serif;font-size:3rem;color:var(--kodak);margin-bottom:.5rem;}
.pin-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:.2em;color:var(--cream);margin-bottom:.3rem;}
.pin-sub{font-family:"Space Mono",monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:#444;margin-bottom:2rem;}
.pin-input{width:100%;background:#0D0D0D;border:1px solid #333;color:var(--cream);font-family:"Space Mono",monospace;font-size:1rem;padding:.8rem 1rem;outline:none;text-align:center;letter-spacing:.25em;transition:border-color .2s;margin-bottom:.8rem;}
.pin-input:focus{border-color:var(--terracotta);}
.pin-error{font-family:"Space Mono",monospace;font-size:.55rem;color:var(--terracotta);letter-spacing:.1em;height:1rem;margin-bottom:.8rem;}
.pin-btn{width:100%;background:var(--terracotta);color:white;font-family:"Space Mono",monospace;font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:.9rem;border:none;cursor:pointer;transition:background .2s;}
.pin-btn:hover{background:#a33f1f;}
/* MAIN */
main{display:none;max-width:1300px;margin:0 auto;padding:3rem 2rem 5rem;}
main.show{display:block;}
/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:2rem;}
.stat-tile{padding:1.2rem 1rem;text-align:center;cursor:pointer;transition:opacity .2s;}
.stat-tile:hover{opacity:.8;}
.stat-tile.all{background:#222;} .stat-tile.applied{background:var(--s-applied);} .stat-tile.interview{background:var(--s-interview);} .stat-tile.offer{background:var(--s-offer);} .stat-tile.rejected{background:var(--s-rejected);} .stat-tile.waiting{background:var(--s-waiting);}
.stat-num{font-family:"Abril Fatface",serif;font-size:2rem;color:var(--black);line-height:1;}
.stat-tile.all .stat-num,.stat-tile.waiting .stat-num{color:var(--cream);}
.stat-lbl{font-family:"Space Mono",monospace;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--black);margin-top:.3rem;}
.stat-tile.all .stat-lbl,.stat-tile.waiting .stat-lbl{color:var(--warm-grey);}
/* VIEW TOGGLE */
.view-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.view-toggle{display:flex;gap:2px;}
.view-btn{font-family:"Space Mono",monospace;font-size:.55rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1.5px solid #333;background:transparent;color:#555;cursor:pointer;transition:all .2s;}
.view-btn.active{background:var(--kodak);border-color:var(--kodak);color:var(--black);}
.view-btn:hover:not(.active){border-color:var(--warm-grey);color:var(--warm-grey);}
.toolbar-right{display:flex;gap:.6rem;align-items:center;}
.btn-export{font-family:"Space Mono",monospace;font-size:.55rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1.5px solid #333;background:transparent;color:var(--warm-grey);cursor:pointer;transition:all .2s;}
.btn-export:hover{border-color:var(--kodak);color:var(--kodak);}
.search-input{background:#111;border:1px solid #2a2a2a;color:var(--cream);font-family:"Space Mono",monospace;font-size:.75rem;padding:.5rem 1rem;outline:none;width:240px;}
.search-input:focus{border-color:var(--kodak);}
/* ADD FORM */
.add-section{background:#111;border:1px solid #2a2a2a;padding:2rem;margin-bottom:2rem;}
.add-title{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:.2em;color:var(--kodak);margin-bottom:1.2rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1rem;}
.form-group{display:flex;flex-direction:column;gap:.4rem;}
.form-label{font-family:"Space Mono",monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--warm-grey);}
.form-input,.form-select,.form-textarea{background:#0D0D0D;border:1px solid #333;color:var(--cream);font-family:"Space Mono",monospace;font-size:.8rem;padding:.6rem .8rem;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--kodak);}
.form-textarea{resize:vertical;min-height:70px;}
.form-select option{background:#0D0D0D;}
.btn-add{background:var(--kodak);color:var(--black);font-family:"Space Mono",monospace;font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:.8rem 2rem;border:none;cursor:pointer;transition:all .2s;margin-top:.5rem;}
.btn-add:hover{background:var(--kodak-deep);}
/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{font-family:"Space Mono",monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--warm-grey);padding:.8rem 1rem;text-align:left;border-bottom:2px solid #222;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--kodak);}
tbody tr{border-bottom:1px solid #1a1a1a;transition:background .15s;}
tbody tr:hover{background:#111;}
tbody td{padding:.9rem 1rem;font-family:"Space Mono",monospace;font-size:.72rem;color:#A09890;vertical-align:middle;}
td.company{color:var(--cream);font-weight:700;} td.position{color:var(--warm-grey);}
.edit-status-select{background:#111;border:1px solid #333;color:var(--cream);font-family:"Space Mono",monospace;font-size:.65rem;padding:.2rem .4rem;outline:none;cursor:pointer;}
.edit-status-select:focus{border-color:var(--kodak);}
.btn-del{background:none;border:none;color:#333;cursor:pointer;font-size:1rem;transition:color .2s;padding:.2rem;}
.btn-del:hover{color:var(--terracotta);}
.btn-notes-toggle{background:none;border:1.5px solid #333;color:#555;cursor:pointer;font-family:"Space Mono",monospace;font-size:.5rem;padding:.2rem .5rem;transition:all .2s;letter-spacing:.1em;}
.btn-notes-toggle:hover{border-color:var(--kodak);color:var(--kodak);}
.followup-due{color:var(--terracotta) !important;font-weight:700;}
/* NOTES */
.notes-row-el td{padding:0;background:#0a0a0a;}
.notes-panel{padding:1.5rem 2rem;border-left:3px solid var(--terracotta);}
.notes-timeline{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1rem;}
.note-entry{display:flex;gap:1rem;align-items:flex-start;}
.note-date{font-family:"Space Mono",monospace;font-size:.55rem;color:var(--terracotta);white-space:nowrap;padding-top:.1rem;min-width:80px;}
.note-text{font-family:"Space Mono",monospace;font-size:.7rem;color:var(--warm-grey);line-height:1.5;flex:1;}
.note-del{background:none;border:none;color:#333;cursor:pointer;font-size:.8rem;transition:color .2s;}
.note-del:hover{color:var(--terracotta);}
.add-note-row{display:flex;gap:.5rem;margin-top:.5rem;}
.note-input{flex:1;background:#111;border:1px solid #333;color:var(--cream);font-family:"Space Mono",monospace;font-size:.72rem;padding:.5rem .8rem;outline:none;}
.note-input:focus{border-color:var(--terracotta);}
.btn-note-add{background:var(--terracotta);color:white;border:none;font-family:"Space Mono",monospace;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;cursor:pointer;}
.btn-note-add:hover{background:#a33f1f;}
/* KANBAN */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;align-items:start;}
.kanban-col{background:#111;border-top:3px solid #333;padding:1rem;}
.kanban-col.col-Applied{border-top-color:var(--s-applied);} .kanban-col.col-Interview{border-top-color:var(--s-interview);} .kanban-col.col-Offer{border-top-color:var(--s-offer);} .kanban-col.col-Rejected{border-top-color:var(--s-rejected);} .kanban-col.col-Waiting{border-top-color:var(--s-waiting);}
.kanban-col-title{font-family:"Bebas Neue",sans-serif;font-size:.9rem;letter-spacing:.15em;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.kanban-count{font-family:"Space Mono",monospace;font-size:.6rem;background:#222;padding:.1rem .5rem;color:var(--warm-grey);}
.kanban-card{background:#0D0D0D;padding:1rem;margin-bottom:.6rem;border-left:3px solid transparent;transition:border-color .2s;}
.kanban-card:hover{border-left-color:var(--kodak);}
.kanban-company{font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.1em;color:var(--cream);margin-bottom:.2rem;}
.kanban-position{font-family:"Space Mono",monospace;font-size:.6rem;color:var(--warm-grey);margin-bottom:.6rem;line-height:1.4;}
.kanban-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}
.kanban-date{font-family:"Space Mono",monospace;font-size:.55rem;color:#444;}
.kanban-due{font-family:"Space Mono",monospace;font-size:.55rem;color:var(--terracotta);}
.kanban-card-actions{display:flex;gap:.3rem;}
.kanban-status-sel{background:#111;border:1px solid #222;color:var(--warm-grey);font-family:"Space Mono",monospace;font-size:.5rem;padding:.15rem .3rem;outline:none;flex:1;}
.kanban-del-btn{background:none;border:1px solid #222;color:#444;cursor:pointer;font-size:.75rem;padding:.15rem .4rem;transition:all .2s;}
.kanban-del-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
.kanban-empty{font-family:"Space Mono",monospace;font-size:.6rem;color:#2a2a2a;text-align:center;padding:2rem 0;letter-spacing:.1em;}
/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;}
.empty-headline{font-family:"Abril Fatface",serif;font-size:2rem;color:#222;margin-bottom:1rem;}
.empty-state p{font-family:"Space Mono",monospace;font-size:.7rem;color:#444;letter-spacing:.1em;}
@media(max-width:900px){.stats-bar{grid-template-columns:repeat(3,1fr);}.kanban-board{grid-template-columns:1fr 1fr;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">LvNC</a>
  <span class="nav-title">Application Tracker</span>
  <a href="index.html" class="nav-back">&larr; Portfolio</a>
</nav>

<!-- PIN -->
<div class="pin-screen" id="pin-screen">
  <div class="pin-box">
    <div class="pin-icon">LvNC</div>
    <div class="pin-title">Private Access</div>
    <div class="pin-sub">Enter PIN to continue</div>
    <input type="password" class="pin-input" id="pin-input" placeholder="&middot; &middot; &middot; &middot; &middot; &middot;" autocomplete="off">
    <div class="pin-error" id="pin-error"></div>
    <button class="pin-btn" onclick="checkPin()">Unlock &rarr;</button>
  </div>
</div>

<main id="main-content">
  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-tile all" onclick="filterStatus('all')"><div class="stat-num" id="count-all">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-tile applied" onclick="filterStatus('Applied')"><div class="stat-num" id="count-applied">0</div><div class="stat-lbl">Applied</div></div>
    <div class="stat-tile interview" onclick="filterStatus('Interview')"><div class="stat-num" id="count-interview" style="color:white">0</div><div class="stat-lbl" style="color:white">Interview</div></div>
    <div class="stat-tile offer" onclick="filterStatus('Offer')"><div class="stat-num" id="count-offer" style="color:white">0</div><div class="stat-lbl" style="color:white">Offer</div></div>
    <div class="stat-tile rejected" onclick="filterStatus('Rejected')"><div class="stat-num" id="count-rejected" style="color:white">0</div><div class="stat-lbl" style="color:white">Rejected</div></div>
    <div class="stat-tile waiting" onclick="filterStatus('all')"><div class="stat-num" id="count-followup">0</div><div class="stat-lbl">Follow-up Due</div></div>
  </div>

  <!-- ADD FORM -->
  <div class="add-section">
    <p class="add-title" onclick="toggleAddForm()">+ New Application <span id="add-arrow">&#9650;</span></p>
    <div id="add-form-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Company *</label><input type="text" class="form-input" id="inp-company" placeholder="Rheingau Musik Festival"></div>
        <div class="form-group"><label class="form-label">Position *</label><input type="text" class="form-input" id="inp-position" placeholder="Praktikum Veranstaltungsmanagement"></div>
        <div class="form-group"><label class="form-label">Contact Person</label><input type="text" class="form-input" id="inp-contact" placeholder="Frau M&uuml;ller"></div>
        <div class="form-group"><label class="form-label">Date Applied</label><input type="date" class="form-input" id="inp-date"></div>
        <div class="form-group"><label class="form-label">Follow-up Date</label><input type="date" class="form-input" id="inp-followup"></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="inp-status">
            <option value="Applied">Applied</option><option value="Interview">Interview</option>
            <option value="Offer">Offer</option><option value="Rejected">Rejected</option>
            <option value="Waiting">Waiting</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">Notes</label>
          <textarea class="form-textarea" id="inp-notes" placeholder="Cover letter sent, mentioned Theater Festival experience..."></textarea>
        </div>
      </div>
      <button class="btn-add" onclick="addApplication()">+ Add Application</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="view-bar">
    <div style="display:flex;gap:.6rem;align-items:center;">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-table" onclick="setView('table')">&#9776; Table</button>
        <button class="view-btn" id="btn-kanban" onclick="setView('kanban')">&#9632;&#9632; Kanban</button>
      </div>
      <span class="form-label" id="active-filter" style="padding-left:.5rem;">Showing: All</span>
    </div>
    <div class="toolbar-right">
      <input type="text" class="search-input" id="search-inp" placeholder="Search..." oninput="render()">
      <button class="btn-export" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>
  </div>

  <!-- TABLE VIEW -->
  <div id="view-table">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy('company')">Company</th>
          <th onclick="sortBy('position')">Position</th>
          <th onclick="sortBy('status')">Status</th>
          <th onclick="sortBy('date')">Applied</th>
          <th onclick="sortBy('followup')">Follow-up</th>
          <th>Contact</th>
          <th>Timeline</th>
          <th></th>
        </tr></thead>
        <tbody id="app-table-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">
        <p class="empty-headline">No applications yet</p>
        <p>Add your first application above.</p>
      </div>
    </div>
  </div>

  <!-- KANBAN VIEW -->
  <div id="view-kanban" style="display:none;">
    <div class="kanban-board" id="kanban-board"></div>
  </div>
</main>

<script>
var PIN = "l48uM,k17Z,_f-_,L1";
var apps = JSON.parse(localStorage.getItem("lvnc_apps") || "[]");
var currentFilter = "all";
var currentView = "table";
var sortKey = "date";
var sortDir = -1;
var expandedRows = {};

// PIN CHECK
(function(){
  if(sessionStorage.getItem("tracker_unlocked") === "1"){
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("main-content").classList.add("show");
  }
  document.getElementById("pin-input").addEventListener("keydown", function(e){
    if(e.keyCode === 13) checkPin();
  });
})();

function checkPin(){
  var val = document.getElementById("pin-input").value;
  if(val === PIN){
    sessionStorage.setItem("tracker_unlocked","1");
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("main-content").classList.add("show");
    render(); updateStats();
  } else {
    document.getElementById("pin-error").textContent = "Incorrect PIN.";
    document.getElementById("pin-input").value = "";
    document.getElementById("pin-input").focus();
  }
}

function save(){ localStorage.setItem("lvnc_apps", JSON.stringify(apps)); }

function toggleAddForm(){
  var b = document.getElementById("add-form-body");
  b.style.display = b.style.display === "none" ? "" : "none";
}

function addApplication(){
  var company = document.getElementById("inp-company").value.trim();
  var position = document.getElementById("inp-position").value.trim();
  if(!company||!position){ alert("Please enter company and position."); return; }
  apps.unshift({
    id: Date.now(), company:company, position:position,
    contact: document.getElementById("inp-contact").value.trim(),
    date: document.getElementById("inp-date").value,
    followup: document.getElementById("inp-followup").value,
    status: document.getElementById("inp-status").value,
    notes: document.getElementById("inp-notes").value.trim(),
    timeline: []
  });
  save();
  ["inp-company","inp-position","inp-contact","inp-date","inp-followup","inp-notes"].forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("inp-status").value = "Applied";
  render(); updateStats();
}

function deleteApp(id){
  if(!confirm("Remove this application?")) return;
  apps = apps.filter(function(a){ return a.id !== id; });
  delete expandedRows[id];
  save(); render(); updateStats();
}

function updateStatus(id, val){
  var a = apps.find(function(x){ return x.id === id; });
  if(a){ a.status = val; save(); render(); updateStats(); }
}

function addNote(id){
  id = parseInt(id);
  var inp = document.getElementById("note-inp-" + id);
  if(!inp) return;
  var text = inp.value.trim();
  if(!text) return;
  var a = apps.find(function(x){ return x.id === id; });
  if(!a) return;
  if(!a.timeline) a.timeline = [];
  a.timeline.push({ date: new Date().toISOString().slice(0,10), text: text });
  save(); inp.value = "";
  renderNotesPanel(id);
  var btn = document.getElementById("notes-btn-" + id);
  if(btn){ var tl = a.timeline||[]; btn.textContent = "Hide (" + tl.length + ")"; }
}

function deleteNote(id, idx){
  id = parseInt(id);
  var a = apps.find(function(x){ return x.id === id; });
  if(!a||!a.timeline) return;
  a.timeline.splice(idx,1);
  save(); renderNotesPanel(id);
}

function renderNotesPanel(id){
  var panel = document.getElementById("notes-panel-" + id);
  if(!panel) return;
  var a = apps.find(function(x){ return x.id === id; });
  if(!a) return;
  var tl = a.timeline || [];
  var html = "<div class=\"notes-panel\"><div class=\"notes-timeline\">";
  if(tl.length === 0){ html += "<p style=\"font-family:Space Mono,monospace;font-size:.6rem;color:#333;\">No entries yet.</p>"; }
  tl.forEach(function(n,i){
    html += "<div class=\"note-entry\"><span class=\"note-date\">" + escHtml(n.date) + "</span><span class=\"note-text\">" + escHtml(n.text) + "</span><button class=\"note-del\" onclick=\"deleteNote(" + id + "," + i + ")\">&times;</button></div>";
  });
  html += "</div><div class=\"add-note-row\"><input type=\"text\" class=\"note-input\" id=\"note-inp-" + id + "\" placeholder=\"Add update...\"><button class=\"btn-note-add\" onclick=\"addNote(" + id + ")\">+ Add</button></div></div>";
  panel.innerHTML = html;
  var ni = document.getElementById("note-inp-" + id);
  if(ni){ ni.addEventListener("keydown", function(e){ if(e.keyCode === 13){ addNote(id); } }); }
}

function toggleNotes(id){
  expandedRows[id] = !expandedRows[id];
  var row = document.getElementById("notes-row-" + id);
  if(row) row.style.display = expandedRows[id] ? "" : "none";
  if(expandedRows[id]) renderNotesPanel(id);
  var btn = document.getElementById("notes-btn-" + id);
  if(btn){
    var a = apps.find(function(x){ return x.id === id; });
    var cnt = a && a.timeline ? a.timeline.length : 0;
    btn.textContent = expandedRows[id] ? ("Hide" + (cnt > 0 ? " (" + cnt + ")" : "")) : ("Timeline" + (cnt > 0 ? " (" + cnt + ")" : ""));
  }
}

function filterStatus(s){ currentFilter = s; document.getElementById("active-filter").textContent = "Showing: " + (s==="all"?"All":s); render(); }

function sortBy(key){ sortDir = (sortKey === key) ? sortDir * -1 : -1; sortKey = key; render(); }

function isFollowupDue(d){ return d && new Date(d) <= new Date(); }

function fmt(d){ if(!d) return "&mdash;"; var p = d.split("-"); return p[2]+"."+p[1]+"."+p[0]; }

function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function getFiltered(){
  var search = document.getElementById("search-inp").value.toLowerCase();
  var list = apps.filter(function(a){
    return (currentFilter==="all"||a.status===currentFilter) &&
           (!search||a.company.toLowerCase().includes(search)||a.position.toLowerCase().includes(search));
  });
  list.sort(function(a,b){
    var va = a[sortKey]||"", vb = b[sortKey]||"";
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
  return list;
}

function render(){
  if(currentView === "table") renderTable();
  else renderKanban();
}

function setView(v){
  currentView = v;
  document.getElementById("btn-table").classList.toggle("active", v==="table");
  document.getElementById("btn-kanban").classList.toggle("active", v==="kanban");
  document.getElementById("view-table").style.display = v==="table" ? "" : "none";
  document.getElementById("view-kanban").style.display = v==="kanban" ? "" : "none";
  render();
}

function renderTable(){
  var filtered = getFiltered();
  document.getElementById("empty-state").style.display = filtered.length===0 ? "block" : "none";
  document.getElementById("app-table-body").innerHTML = filtered.map(function(a){
    var due = isFollowupDue(a.followup);
    var tl = a.timeline || [];
    var expanded = expandedRows[a.id];
    var statusOpts = ["Applied","Interview","Offer","Rejected","Waiting"].map(function(s){
      return "<option value=\""+s+"\"" + (a.status===s?" selected":"") + ">"+s+"</option>";
    }).join("");
    var mainRow = "<tr>" +
      "<td class=\"company\">" + escHtml(a.company) + "</td>" +
      "<td class=\"position\">" + escHtml(a.position) + "</td>" +
      "<td><select class=\"edit-status-select\" onchange=\"updateStatus("+a.id+",this.value)\">" + statusOpts + "</select></td>" +
      "<td>" + fmt(a.date) + "</td>" +
      "<td class=\"" + (due?"followup-due":"") + "\">" + fmt(a.followup) + (due?" &#9888;":"") + "</td>" +
      "<td>" + escHtml(a.contact||"") + "</td>" +
      "<td><button class=\"btn-notes-toggle\" id=\"notes-btn-"+a.id+"\" onclick=\"toggleNotes("+a.id+")\">" + (expanded?"Hide":"Timeline") + (tl.length>0?" ("+tl.length+")":"") + "</button></td>" +
      "<td><button class=\"btn-del\" onclick=\"deleteApp("+a.id+")\">&times;</button></td>" +
      "</tr>";
    var notesRow = "<tr class=\"notes-row-el\" id=\"notes-row-"+a.id+"\" style=\"display:"+(expanded?"":"none")+"\"><td colspan=\"8\" id=\"notes-panel-"+a.id+"\"></td></tr>";
    return mainRow + notesRow;
  }).join("");
  filtered.forEach(function(a){ if(expandedRows[a.id]) renderNotesPanel(a.id); });
}

function renderKanban(){
  var statuses = ["Applied","Interview","Offer","Waiting","Rejected"];
  var colors = {Applied:"#F5C800",Interview:"#4A90D9",Offer:"#27AE60",Rejected:"#C4522A",Waiting:"#888"};
  var search = document.getElementById("search-inp").value.toLowerCase();
  document.getElementById("kanban-board").innerHTML = statuses.map(function(s){
    var cards = apps.filter(function(a){
      return a.status===s &&
             (!search||a.company.toLowerCase().includes(search)||a.position.toLowerCase().includes(search)) &&
             (currentFilter==="all"||currentFilter===s);
    });
    var cardsHtml = cards.length===0 ? "<div class=\"kanban-empty\">Empty</div>" :
      cards.map(function(a){
        var due = isFollowupDue(a.followup);
        var opts = ["Applied","Interview","Offer","Rejected","Waiting"].map(function(st){
          return "<option value=\""+st+"\"" + (a.status===st?" selected":"") + ">"+st+"</option>";
        }).join("");
        return "<div class=\"kanban-card\">" +
          "<div class=\"kanban-company\">" + escHtml(a.company) + "</div>" +
          "<div class=\"kanban-position\">" + escHtml(a.position) + "</div>" +
          "<div class=\"kanban-meta\">" +
            "<span class=\"kanban-date\">" + fmt(a.date) + "</span>" +
            (due ? "<span class=\"kanban-due\">&#9888; Follow-up</span>" : "") +
          "</div>" +
          "<div class=\"kanban-card-actions\">" +
            "<select class=\"kanban-status-sel\" onchange=\"updateStatus("+a.id+",this.value)\">" + opts + "</select>" +
            "<button class=\"kanban-del-btn\" onclick=\"deleteApp("+a.id+")\">&times;</button>" +
          "</div>" +
        "</div>";
      }).join("");
    return "<div class=\"kanban-col col-"+s+"\">" +
      "<div class=\"kanban-col-title\" style=\"color:"+colors[s]+"\">"+s+" <span class=\"kanban-count\">"+cards.length+"</span></div>" +
      cardsHtml + "</div>";
  }).join("");
}

function updateStats(){
  var today = new Date(); today.setHours(0,0,0,0);
  var counts = {Applied:0,Interview:0,Offer:0,Rejected:0,Waiting:0};
  var due = 0;
  apps.forEach(function(a){
    if(counts[a.status]!==undefined) counts[a.status]++;
    if(a.followup && new Date(a.followup)<=today) due++;
  });
  document.getElementById("count-all").textContent = apps.length;
  document.getElementById("count-applied").textContent = counts.Applied;
  document.getElementById("count-interview").textContent = counts.Interview;
  document.getElementById("count-offer").textContent = counts.Offer;
  document.getElementById("count-rejected").textContent = counts.Rejected;
  document.getElementById("count-followup").textContent = due;
}

function exportCSV(){
  if(!apps.length){ alert("No applications to export."); return; }
  var headers = ["Company","Position","Status","Date Applied","Follow-up","Contact","Notes"];
  var rows = apps.map(function(a){
    return [a.company,a.position,a.status,a.date,a.followup,a.contact,a.notes].map(function(v){
      return "\"" + (v||"").replace(/"/g,'""'') + "\"";
    }).join(",");
  });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([[headers.join(",")].concat(rows).join("\n")],{type:"text/csv"}));
  a.download = "Lorenzo_Applications_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
}

apps.forEach(function(a){ if(!a.timeline) a.timeline=[]; });
document.getElementById("inp-date").valueAsDate = new Date();
</script>
