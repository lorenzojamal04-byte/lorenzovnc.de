<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0D0D0D"/>
  <!-- outer circle -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#F5C800" stroke-width="1.4"/>
  <!-- crosshair lines — extend beyond circle -->
  <line x1="16" y1="2" x2="16" y2="10" stroke="#F5C800" stroke-width="1.4"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#F5C800" stroke-width="1.4"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#F5C800" stroke-width="1.4"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#F5C800" stroke-width="1.4"/>
  <!-- centre dot -->
  <circle cx="16" cy="16" r="1.8" fill="#F5C800"/>
</svg>